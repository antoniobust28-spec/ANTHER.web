<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTHER — Navajas para Gallo | El Payo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dark: #8B6914;
    --red: #9B1C1C;
    --red-bright: #CC2222;
    --black: #080808;
    --black-2: #111111;
    --black-3: #1A1A1A;
    --silver: #D0D0D0;
    --white: #F5F0E8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(8,8,8,0.98) 0%, rgba(8,8,8,0) 100%);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    backdrop-filter: blur(4px);
  }

  .nav-logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--silver);
    text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* ── HERO ── */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 40%, rgba(155,28,28,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 60%),
      var(--black);
  }

  /* Diagonal gold lines */
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 120px,
        rgba(201,168,76,0.025) 120px,
        rgba(201,168,76,0.025) 121px
      );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    animation: heroIn 1.2s ease forwards;
  }

  @keyframes heroIn {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s ease forwards;
  }

  .hero-logo-img {
    width: min(420px, 80vw);
    filter: drop-shadow(0 0 60px rgba(201,168,76,0.3)) drop-shadow(0 0 20px rgba(155,28,28,0.3));
    opacity: 0;
    animation: fadeUp 1s 0.5s ease forwards;
  }

  .hero-tagline {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 5px;
    color: var(--silver);
    margin-top: 32px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s ease forwards;
  }

  .hero-tagline span { color: var(--gold); }

  .hero-cta {
    margin-top: 52px;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s ease forwards;
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-gold {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold));
    color: var(--black);
    text-decoration: none;
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: filter 0.3s, transform 0.2s;
    display: inline-block;
  }

  .btn-gold:hover {
    filter: brightness(1.2);
    transform: translateY(-2px);
  }

  .btn-outline {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 15px 40px;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold);
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s;
    display: inline-block;
  }

  .btn-outline:hover {
    background: rgba(201,168,76,0.1);
    transform: translateY(-2px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scroll indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 1.8s ease forwards;
  }

  .scroll-indicator span {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 4px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
  }

  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
    animation: scrollPulse 2s ease-in-out infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.1); }
  }

  /* ── SECTION BASE ── */
  section {
    padding: 100px 48px;
    position: relative;
  }

  .section-header {
    text-align: center;
    margin-bottom: 72px;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
    display: block;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
  }

  .gold-divider {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
  }

  /* ── MISIÓN ── */
  #mision {
    background: var(--black-2);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  #mision::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .mision-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .mision-card {
    background: var(--black-3);
    padding: 52px 36px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }

  .mision-card:hover { transform: translateY(-4px); }

  .mision-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .mision-card::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -60px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(201,168,76,0.04);
  }

  .mision-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: rgba(201,168,76,0.08);
    line-height: 1;
    margin-bottom: 20px;
    display: block;
  }

  .mision-icon {
    font-size: 2rem;
    margin-bottom: 20px;
    display: block;
  }

  .mision-card h3 {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .mision-card p {
    font-size: 0.9rem;
    line-height: 1.8;
    color: rgba(245,240,232,0.7);
    font-weight: 300;
  }

  .years-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--black);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 20px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    margin-top: 24px;
    display: inline-block;
  }

  /* ── PRODUCTOS ── */
  #productos {
    background: var(--black);
  }

  #productos::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.015) 60px,
        rgba(201,168,76,0.015) 61px
      );
    pointer-events: none;
  }

  .productos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 960px;
    margin: 0 auto;
  }

  .producto-card {
    position: relative;
    background: var(--black-2);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 56px 48px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
    cursor: default;
  }

  .producto-card:hover {
    border-color: var(--gold);
    transform: translateY(-6px);
  }

  .producto-card.premium {
    border-color: rgba(201,168,76,0.4);
    background: linear-gradient(145deg, var(--black-2) 0%, rgba(201,168,76,0.04) 100%);
  }

  .producto-card.premium::after {
    content: 'PREMIUM';
    position: absolute;
    top: 20px; right: -28px;
    background: linear-gradient(135deg, var(--red), var(--red-bright));
    color: white;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 3px;
    padding: 6px 40px;
    transform: rotate(45deg);
    transform-origin: center;
  }

  .producto-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
  }

  .producto-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 700;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .producto-name span {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .producto-desc {
    font-size: 0.88rem;
    line-height: 1.9;
    color: rgba(245,240,232,0.65);
    font-weight: 300;
    margin: 20px 0 28px;
  }

  .producto-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .producto-features li {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
    color: rgba(245,240,232,0.8);
    font-weight: 400;
  }

  .producto-features li::before {
    content: '◆';
    color: var(--gold);
    font-size: 0.5rem;
    flex-shrink: 0;
  }

  .producto-visual {
    position: absolute;
    bottom: -20px; right: -20px;
    font-size: 8rem;
    opacity: 0.03;
    pointer-events: none;
    line-height: 1;
  }

  /* ── MATERIALES ── */
  #materiales {
    background: var(--black-2);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .materiales-content {
    max-width: 1000px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
  }

  .material-stat-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .material-stat {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    padding: 28px 0;
    transition: background 0.3s;
  }

  .material-stat:first-child { border-top: 1px solid rgba(201,168,76,0.1); }

  .material-stat:hover { background: rgba(201,168,76,0.03); }

  .stat-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }

  .stat-info h4 {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-info p {
    font-size: 0.82rem;
    color: rgba(245,240,232,0.6);
    line-height: 1.6;
    font-weight: 300;
  }

  .materiales-text h3 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
    line-height: 1.3;
  }

  .materiales-text h3 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .materiales-text p {
    font-size: 0.9rem;
    line-height: 1.9;
    color: rgba(245,240,232,0.65);
    font-weight: 300;
    margin-bottom: 20px;
  }

  .acero-badges {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 32px;
  }

  .acero-badge {
    padding: 10px 24px;
    border: 1px solid var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .acero-badge.filled {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--black);
    border-color: transparent;
    font-weight: 700;
  }

  /* ── CONTACTO ── */
  #contacto {
    background: var(--black);
    text-align: center;
  }

  .contacto-inner {
    max-width: 700px;
    margin: 0 auto;
  }

  .contacto-inner p {
    font-size: 0.95rem;
    line-height: 1.9;
    color: rgba(245,240,232,0.65);
    font-weight: 300;
    margin-bottom: 52px;
  }

  .contacto-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 64px;
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 18px 44px;
    background: linear-gradient(135deg, #1a5c2e, #25a244);
    color: white;
    text-decoration: none;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: filter 0.3s, transform 0.2s;
  }

  .btn-whatsapp:hover {
    filter: brightness(1.2);
    transform: translateY(-2px);
  }

  .btn-facebook {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 18px 44px;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    border: 1px solid var(--gold);
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.3s;
  }

  .btn-facebook:hover {
    background: rgba(201,168,76,0.1);
    transform: translateY(-2px);
  }

  .contacto-sep {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin-bottom: 48px;
  }

  .redes-title {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 6px;
    color: rgba(201,168,76,0.5);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: block;
  }

  .redes-links {
    display: flex;
    gap: 24px;
    justify-content: center;
  }

  .red-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 3px;
    color: var(--silver);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
    padding: 12px 20px;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .red-link:hover { color: var(--gold); border-color: var(--gold); }

  /* ── FOOTER ── */
  footer {
    background: #050505;
    padding: 40px 48px;
    border-top: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: gap;
  }

  .footer-brand {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 3px;
  }

  .footer-copy {
    font-size: 0.72rem;
    color: rgba(245,240,232,0.3);
    letter-spacing: 1px;
    font-weight: 300;
  }

  .footer-tagline {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: rgba(201,168,76,0.4);
    text-transform: uppercase;
  }

  /* ── DECORATIVE RED ACCENT LINES ── */
  .red-accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--red-bright) 50%, var(--red) 70%, transparent 100%);
  }

  /* ── ANIMATIONS ON SCROLL ── */
  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav { padding: 16px 20px; }
    .nav-links { display: none; }
    section { padding: 72px 20px; }
    .mision-grid { grid-template-columns: 1fr; gap: 2px; }
    .productos-grid { grid-template-columns: 1fr; }
    .materiales-content { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 16px; text-align: center; }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      width: 24px;
      height: 1.5px;
      background: var(--gold);
      display: block;
      transition: all 0.3s;
    }
  }

  @media (min-width: 769px) {
    .hamburger { display: none; }
  }

  /* Mobile nav menu */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(8,8,8,0.98);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    letter-spacing: 5px;
    color: var(--gold);
    text-decoration: none;
    text-transform: uppercase;
  }

  .mobile-menu-close {
    position: absolute;
    top: 20px; right: 20px;
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.8rem;
    cursor: pointer;
  }

  /* Gold shimmer animation */
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .shimmer-text {
    background: linear-gradient(90deg, var(--gold-dark) 0%, var(--gold-light) 40%, var(--gold-dark) 60%, var(--gold) 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }

  /* ── GALERÍA ── */
  #galeria {
    background: var(--black-2);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .galeria-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .galeria-card {
    background: var(--black-3);
    border: 1px solid rgba(201,168,76,0.12);
    overflow: hidden;
    cursor: zoom-in;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
  }

  .galeria-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
  }

  .galeria-card.premium {
    border-color: rgba(201,168,76,0.35);
  }

  .galeria-img-wrap {
    position: relative;
    overflow: hidden;
    background: #fff;
    aspect-ratio: 4/3;
  }

  .galeria-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 16px;
    transition: transform 0.4s ease;
    display: block;
  }

  .galeria-card:hover .galeria-img-wrap img {
    transform: scale(1.06);
  }

  .galeria-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }

  .galeria-card:hover .galeria-overlay {
    background: rgba(0,0,0,0.18);
  }

  .zoom-icon {
    font-size: 2.5rem;
    color: var(--gold);
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.3s;
    text-shadow: 0 0 20px rgba(201,168,76,0.8);
  }

  .galeria-card:hover .zoom-icon {
    opacity: 1;
    transform: scale(1);
  }

  .galeria-info {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(201,168,76,0.1);
  }

  .galeria-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .galeria-label {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 3px;
    color: rgba(245,240,232,0.5);
    text-transform: uppercase;
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }

  #lightbox.open {
    display: flex;
  }

  .lightbox-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .lb-close {
    position: absolute;
    top: -48px;
    right: -8px;
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    font-size: 1.2rem;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    z-index: 10;
  }

  .lb-close:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  .lb-img-wrap {
    overflow: hidden;
    position: relative;
    background: white;
    border: 1px solid rgba(201,168,76,0.3);
  }

  #lb-img {
    max-width: 80vw;
    max-height: 70vh;
    object-fit: contain;
    display: block;
    cursor: zoom-in;
    transition: transform 0.3s ease;
    transform-origin: center center;
    padding: 16px;
  }

  #lb-caption {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
  }

  @media (max-width: 768px) {
    .galeria-grid { grid-template-columns: 1fr; }
  }

</style>
</head>
